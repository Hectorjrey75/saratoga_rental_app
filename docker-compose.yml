version: '3.8'

services:
  rental-app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: rental_price_predictor
    ports:
      - "8501:8501"
    volumes:
      # Montar directorios de datos para persistencia
      - ./data:/app/data
      - ./logs:/app/logs
      # Excluir cachés de Python del montaje
      #- /app/__pycache__
    environment:
      - LOG_LEVEL=INFO
      - DEBUG=False
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false

    #restart: unless-stopped
    #healthcheck:
    #  test: ["CMD", "curl", "--fail", "http://localhost:8501/_stcore/health"]
    #  interval: 30s
    #  timeout: 10s
    #  retries: 3
    #  start_period: 40s

    stdin_open: true    # Importante para Streamlit
    tty: true           # Importante para Streamlit
    restart: unless-stopped
    command: streamlit run app/main.py --server.headless true --server.port=8501 --server.address=0.0.0.0
